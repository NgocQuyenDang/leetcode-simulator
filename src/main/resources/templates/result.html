<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kết quả nộp bài | WebJudge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-slate-100 min-h-screen text-slate-800">

<!-- HEADER -->
<header class="h-14 bg-white border-b flex items-center justify-between px-8">
    <span class="font-black text-emerald-600 text-lg">WebJudge</span>

    <a th:href="@{/problems}"
       class="text-sm text-slate-500 hover:text-emerald-600">
        Danh sách bài
    </a>
</header>

<!-- MAIN -->
<main class="max-w-4xl mx-auto p-8">

    <!-- RESULT -->
    <div class="mb-4">
    <span
            th:text="${submission.result}"
            th:class="${submission.result == 'AC'
            ? 'text-emerald-600 font-bold'
            : 'text-rose-600 font-bold'}">
        AC
    </span>
    </div>


    <!-- ACTION -->
    <a th:href="@{/problem/{id}(id=${submission.problem.id})}"
       class="inline-block mb-6 bg-emerald-600 hover:bg-emerald-700
              text-white px-6 py-3 rounded-lg font-bold">
        Làm lại
    </a>

    <!-- SOURCE CODE -->
    <div class="mt-2 bg-[#1e1e1e] rounded-xl shadow overflow-hidden">

        <div class="px-6 py-3 bg-[#252526] text-slate-300
                    text-sm font-bold flex justify-between">
            <span>
                <i class="fab fa-java mr-2"></i>
                Source Code
            </span>

            <button onclick="copyCode()"
                    class="text-xs hover:text-emerald-400">
                Copy
            </button>
        </div>

        <pre class="p-6 overflow-x-auto text-sm text-emerald-400">
<code id="code" th:text="${submission.sourceCode}">// code here</code>
        </pre>
    </div>

</main>

<script>
    function copyCode() {
        const text = document.getElementById("code").innerText;
        navigator.clipboard.writeText(text);
        alert("Đã sao chép code");
    }
</script>

</body>
</html>
